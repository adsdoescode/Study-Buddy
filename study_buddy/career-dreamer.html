<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Career Dreamer Session Wrapper</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e0e0e0;
      --accent: #52e8a0;
      --accent2: #ff6b6b;
      --accent3: #4ecdc4;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      line-height: 1.6;
      min-height: 100vh;
      padding: 20px;
    }

    .cd-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .cd-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .cd-header h1 {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
    }

    .cd-back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .cd-back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ========== IDLE PHASE ========== */
    .cd-idle {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .cd-greeting {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .cd-greeting h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .cd-greeting p {
      font-size: 14px;
      color: #999;
      margin-bottom: 16px;
    }

    .cd-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cd-input-group label {
      font-size: 13px;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .cd-input-group textarea {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
    }

    .cd-input-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(82, 232, 160, 0.02);
    }

    .cd-action-btn {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      align-self: flex-start;
    }

    .cd-action-btn:hover {
      background: #40d89d;
      transform: translateY(-2px);
    }

    .cd-action-btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .cd-action-btn.secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cd-history {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cd-history h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #aaa;
    }

    .cd-history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cd-history-card:hover {
      border-color: var(--accent);
      background: rgba(82, 232, 160, 0.02);
    }

    .cd-history-date {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .cd-history-summary {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .cd-history-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cd-tag {
      background: rgba(82, 232, 160, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ========== BRIEFING PHASE ========== */
    .cd-briefing,
    .cd-debrief,
    .cd-summary {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cd-mission-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(82, 232, 160, 0.05), transparent);
    }

    .cd-mission-card h3 {
      color: var(--accent);
      font-size: 16px;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .cd-mission-card .cd-goals {
      margin-top: 8px;
      padding: 12px 0;
      font-size: 13px;
      color: #ccc;
      border-top: 1px solid var(--border);
    }

    .cd-mission-content {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* ========== ACTIVE PHASE ========== */
    .cd-active {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .cd-timer {
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 14px;
      padding: 32px;
      text-align: center;
    }

    .cd-timer-label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .cd-timer-display {
      font-size: 56px;
      font-weight: 900;
      color: var(--accent);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .cd-scratchpad-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .cd-scratchpad-section label {
      display: block;
      font-size: 13px;
      color: #aaa;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .cd-scratchpad-section textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      min-height: 120px;
      resize: vertical;
    }

    .cd-scratchpad-section textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(82, 232, 160, 0.02);
    }

    /* ========== DEBRIEF PHASE ========== */
    .cd-chat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .cd-chat-message {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cd-chat-message.ai .cd-avatar {
      color: var(--accent);
    }

    .cd-chat-message.user .cd-avatar {
      color: var(--accent2);
    }

    .cd-avatar {
      font-size: 16px;
      min-width: 24px;
    }

    .cd-bubble {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      flex: 1;
    }

    .cd-chat-message.user .cd-bubble {
      background: rgba(82, 232, 160, 0.1);
      border: 1px solid rgba(82, 232, 160, 0.2);
      color: var(--text);
    }

    .cd-debrief-input {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .cd-debrief-input textarea {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      min-height: 60px;
      resize: vertical;
    }

    .cd-debrief-input textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(82, 232, 160, 0.02);
    }

    .cd-debrief-submit {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      align-self: flex-start;
    }

    .cd-debrief-submit:hover {
      background: #40d89d;
    }

    /* ========== SUMMARY PHASE ========== */
    .cd-summary-card {
      background: var(--surface);
      border: 1px solid var(--accent3);
      border-radius: 14px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(78, 205, 196, 0.05), transparent);
    }

    .cd-summary-card h3 {
      color: var(--accent3);
      font-size: 14px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .cd-summary-text {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 16px;
      color: #ddd;
    }

    .cd-summary-section {
      margin-bottom: 16px;
    }

    .cd-summary-section-title {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .cd-themes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ========== LOADING STATE ========== */
    .cd-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .cd-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 640px) {
      .cd-container {
        padding: 0;
      }

      .cd-header {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .cd-header h1 {
        font-size: 22px;
      }

      .cd-timer-display {
        font-size: 40px;
      }

      .cd-mission-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============= API CALLS =============
    const callGemini = async (messages, systemPrompt) => {
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: [
              ...messages,
            ],
            model: "gemini-2.0-flash",
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || "API error");
        return data.reply;
      } catch (err) {
        console.error("Gemini API error:", err);
        throw err;
      }
    };

    // ============= UTILS =============
    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const getCurrentDate = () => new Date().toLocaleDateString();

    // ============= COMPONENTS =============

    function IdlePhase({ onStartSession, sessionHistory }) {
      const [goal, setGoal] = useState("");
      const [expandedId, setExpandedId] = useState(null);

      return (
        <div className="cd-idle">
          <div className="cd-greeting">
            <h2>🚀 Welcome to Career Dreamer Sessions</h2>
            <p>
              {sessionHistory.length > 0
                ? `You've completed ${sessionHistory.length} session(s). What's your goal today?`
                : "Start your first career exploration session."}
            </p>

            <div className="cd-input-group">
              <label>What do you want to explore today?</label>
              <textarea
                value={goal}
                onChange={(e) => setGoal(e.target.value)}
                placeholder="E.g., Learn about UX design, explore product management roles, understand AI careers..."
              />
            </div>

            <button
              className="cd-action-btn"
              onClick={() => onStartSession(goal)}
              disabled={!goal.trim()}
              style={{ opacity: goal.trim() ? 1 : 0.5, cursor: goal.trim() ? "pointer" : "not-allowed" }}
            >
              Start Session →
            </button>
          </div>

          {sessionHistory.length > 0 && (
            <div className="cd-history">
              <h3>Past Sessions</h3>
              {sessionHistory.map((session) => (
                <div
                  key={session.id}
                  className="cd-history-card"
                  onClick={() => setExpandedId(expandedId === session.id ? null : session.id)}
                >
                  <div className="cd-history-date">{session.date} • {session.timeSpentMinutes} min</div>
                  <div className="cd-history-summary">
                    {expandedId === session.id
                      ? session.summary.slice(0, 200) + "..."
                      : session.goals.slice(0, 100) + "..."}
                  </div>
                  {session.themes && (
                    <div className="cd-history-tags">
                      {session.themes.split(",").map((theme) => (
                        <span key={theme} className="cd-tag">{theme.trim()}</span>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function BriefingPhase({ goals, onStartExploring, isLoading, missionData }) {
      return (
        <div className="cd-briefing">
          <div className="cd-mission-card">
            <h3>📋 Your Mission</h3>
            <div className="cd-goals">Goal: {goals}</div>
            {isLoading ? (
              <div className="cd-loading">
                <div className="cd-spinner"></div>
                <span>Generating your mission...</span>
              </div>
            ) : (
              <div className="cd-mission-content">{missionData}</div>
            )}
          </div>

          <button
            className="cd-action-btn"
            onClick={onStartExploring}
            disabled={isLoading}
          >
            Open Career Dreamer ↗
          </button>
        </div>
      );
    }

    function ActivePhase({ goals, missionData, onReturn, elapsedSeconds }) {
      const [notes, setNotes] = useState("");

      return (
        <div className="cd-active">
          <div className="cd-timer">
            <div className="cd-timer-label">Time Spent</div>
            <div className="cd-timer-display">{formatTime(elapsedSeconds)}</div>
          </div>

          <div className="cd-mission-card">
            <h3>📋 Your Mission</h3>
            <div className="cd-goals">Goal: {goals}</div>
            <div className="cd-mission-content">{missionData}</div>
          </div>

          <div className="cd-scratchpad-section">
            <label>Scratchpad - Paste notes from your session</label>
            <textarea
              value={notes}
              onChange={(e) => setNotes(e.target.value)}
              placeholder="Write or paste any observations, questions, or ideas from your Career Dreamer exploration..."
            />
          </div>

          <button
            className="cd-action-btn"
            onClick={() => onReturn(notes)}
          >
            I'm Back ← Return to Debrief
          </button>
        </div>
      );
    }

    function DebriefPhase({ goals, notes, missionData, onSummary, isLoading, debriefChat, onAnswerQuestion, currentAnswer }) {
      const chatEndRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [debriefChat]);

      const isLastQuestion = debriefChat.filter((m) => m.role === "ai").length === 3;

      return (
        <div className="cd-debrief">
          <div className="cd-mission-card">
            <h3>📋 Session Summary</h3>
            <div className="cd-goals">Goal: {goals}</div>
            <div className="cd-goals">Notes: {notes.slice(0, 100)}...</div>
          </div>

          <div className="cd-chat">
            {debriefChat.length === 0 ? (
              <div className="cd-loading">
                <div className="cd-spinner"></div>
                <span>Loading debrief questions...</span>
              </div>
            ) : (
              <>
                {debriefChat.map((msg, idx) => (
                  <div key={idx} className={`cd-chat-message ${msg.role}`}>
                    <span className="cd-avatar">{msg.role === "ai" ? "🤖" : "🧑"}</span>
                    <div className="cd-bubble">{msg.content}</div>
                  </div>
                ))}
                {!isLastQuestion && (
                  <div className="cd-debrief-input">
                    <textarea
                      value={currentAnswer}
                      onChange={(e) => onAnswerQuestion(e.target.value)}
                      placeholder="Type your response..."
                    />
                    <button
                      className="cd-debrief-submit"
                      onClick={() => onAnswerQuestion(null)}
                      disabled={!currentAnswer.trim()}
                    >
                      Send Answer
                    </button>
                  </div>
                )}
                {isLastQuestion && debriefChat[debriefChat.length - 1].role === "ai" && (
                  <button
                    className="cd-action-btn"
                    onClick={onSummary}
                    disabled={isLoading}
                  >
                    {isLoading ? "Generating Summary..." : "Generate Summary →"}
                  </button>
                )}
                <div ref={chatEndRef} />
              </>
            )}
          </div>
        </div>
      );
    }

    function SummaryPhase({ summary, onNewSession, isLoading }) {
      const summaryParts = summary.split("\n\n");
      const summaryText = summaryParts[0] || "";
      const themesText = summaryParts.find((p) => p.includes("themes")) || summaryParts[1] || "";
      const nextText = summaryParts[summaryParts.length - 1] || "";

      return (
        <div className="cd-summary">
          <div className="cd-summary-card">
            <h3>✨ Session Summary</h3>
            {isLoading ? (
              <div className="cd-loading">
                <div className="cd-spinner"></div>
                <span>Synthesizing your insights...</span>
              </div>
            ) : (
              <>
                <div className="cd-summary-text">{summaryText}</div>

                <div className="cd-summary-section">
                  <div className="cd-summary-section-title">Key Themes</div>
                  <div className="cd-themes">
                    {themesText
                      .split(/[,\n]/)
                      .filter((t) => t.trim() && !t.toLowerCase().includes("themes"))
                      .slice(0, 3)
                      .map((theme) => (
                        <span key={theme} className="cd-tag">{theme.trim()}</span>
                      ))}
                  </div>
                </div>

                <div className="cd-summary-section">
                  <div className="cd-summary-section-title">Next Focus</div>
                  <div className="cd-summary-text">{nextText}</div>
                </div>

                <button className="cd-action-btn" onClick={onNewSession}>
                  Start New Session →
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ============= MAIN APP =============
    function CareerDreamerApp() {
      const [sessionPhase, setSessionPhase] = useState("idle");
      const [sessionHistory, setSessionHistory] = useState([]);
      const [currentSession, setCurrentSession] = useState({
        id: generateId(),
        date: getCurrentDate(),
        goals: "",
        missionPrompt: "",
        timeSpentMinutes: 0,
        reflections: "",
        summary: "",
        themes: "",
      });
      const [missionData, setMissionData] = useState("");
      const [isLoading, setIsLoading] = useState(false);
      const [elapsedSeconds, setElapsedSeconds] = useState(0);
      const [debriefChat, setDebriefChat] = useState([]);
      const [currentAnswer, setCurrentAnswer] = useState("");
      const [summaryData, setSummaryData] = useState("");
      const timerRef = useRef(null);

      // Load from localStorage on mount
      useEffect(() => {
        const saved = localStorage.getItem("careerDreamerSessions");
        if (saved) {
          setSessionHistory(JSON.parse(saved));
        }
      }, []);

      // Handle timer
      useEffect(() => {
        if (sessionPhase === "active") {
          timerRef.current = setInterval(() => {
            setElapsedSeconds((prev) => prev + 1);
          }, 1000);
        }
        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [sessionPhase]);

      // Phase transitions
      const handleStartSession = async (goal) => {
        setCurrentSession({
          ...currentSession,
          goals: goal,
          id: generateId(),
          date: getCurrentDate(),
        });
        setSessionPhase("briefing");
        setIsLoading(true);

        try {
          const systemPrompt = "You are a career learning coach. Given the user's goal, generate: 1) Three focus questions to hold in mind while exploring Google Career Dreamer, 2) Many specific challenges or things to look for. Be concise and motivating. Format as a clear, bulleted list.";
          const messages = [
            {
              role: "user",
              content: `My career exploration goal is: ${goal}`,
            },
          ];
          const response = await callGemini(messages, systemPrompt);
          setMissionData(response);
          setCurrentSession((prev) => ({
            ...prev,
            missionPrompt: response,
          }));
        } catch (err) {
          alert("Error generating mission: " + err.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleStartExploring = () => {
        window.open("https://grow.google/career-dreamer/home/", "_blank");
        setSessionPhase("active");
        setElapsedSeconds(0);
      };

      const handleReturn = async (notes) => {
        setCurrentSession((prev) => ({
          ...prev,
          reflections: notes,
        }));
        setSessionPhase("debrief");
        setIsLoading(true);
        setDebriefChat([]);

        try {
          const systemPrompt = "You are a career learning coach. Based on the user's goals and notes from their Career Dreamer exploration, ask them 1 specific, thoughtful debrief question to deepen their reflection. Ask in a conversational way. Keep it to 1-2 sentences.";
          const messages = [
            {
              role: "user",
              content: `My goal was: ${currentSession.goals}\n\nMy notes from the exploration:\n${notes}`,
            },
          ];
          const response = await callGemini(messages, systemPrompt);
          setDebriefChat([{ role: "ai", content: response }]);
        } catch (err) {
          alert("Error loading debrief: " + err.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleAnswerQuestion = async (answer) => {
        if (answer === null && currentAnswer.trim()) {
          // Submit answer
          const newChat = [
            ...debriefChat,
            { role: "user", content: currentAnswer },
          ];
          setDebriefChat(newChat);
          setCurrentAnswer("");

          // Get next question if there are fewer than 3 AI questions
          const aiQuestionCount = debriefChat.filter((m) => m.role === "ai").length;
          if (aiQuestionCount < 3) {
            setIsLoading(true);
            try {
              const systemPrompt = "You are a career learning coach. Based on the conversation so far, ask the user 1 more specific debrief question. Keep it to 1-2 sentences.";
              const response = await callGemini(
                newChat.map((m) => ({
                  role: m.role === "ai" ? "assistant" : "user",
                  content: m.content,
                })),
                systemPrompt
              );
              setDebriefChat([...newChat, { role: "ai", content: response }]);
            } catch (err) {
              alert("Error getting next question: " + err.message);
            } finally {
              setIsLoading(false);
            }
          }
        } else {
          // Update current answer
          setCurrentAnswer(answer);
        }
      };

      const handleGenerateSummary = async () => {
        setIsLoading(true);
        const timeSpent = Math.floor(elapsedSeconds / 60);

        try {
          const systemPrompt = "Synthesize this debrief into: 1) A 2-3 sentence session summary, 2) Key themes (3 tags separated by commas), 3) A suggested focus for next session. Write warmly and personally. Format as separate paragraphs.";
          const response = await callGemini(
            debriefChat.map((m) => ({
              role: m.role === "ai" ? "assistant" : "user",
              content: m.content,
            })),
            systemPrompt
          );

          setSummaryData(response);
          setCurrentSession((prev) => ({
            ...prev,
            summary: response,
            timeSpentMinutes: timeSpent,
            themes: response.split("\n").find((line) => line.includes("theme")) || "",
          }));
          setSessionPhase("summary");
        } catch (err) {
          alert("Error generating summary: " + err.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleNewSession = () => {
        setSessionHistory((prev) => [...prev, currentSession]);
        localStorage.setItem(
          "careerDreamerSessions",
          JSON.stringify([...sessionHistory, currentSession])
        );

        setCurrentSession({
          id: generateId(),
          date: getCurrentDate(),
          goals: "",
          missionPrompt: "",
          timeSpentMinutes: 0,
          reflections: "",
          summary: "",
          themes: "",
        });
        setMissionData("");
        setDebriefChat([]);
        setCurrentAnswer("");
        setSummaryData("");
        setElapsedSeconds(0);
        setSessionPhase("idle");
      };

      const handleBack = () => {
        if (window.confirm("Leave Career Dreamer? Your progress will not be saved.")) {
          window.location.href = "/";
        }
      };

      return (
        <div className="cd-container">
          <div className="cd-header">
            <h1>🎯 Google Career Dreamer Sessions</h1>
            <button className="cd-back-btn" onClick={handleBack}>
              ← Back to Study Buddy
            </button>
          </div>

          {sessionPhase === "idle" && (
            <IdlePhase onStartSession={handleStartSession} sessionHistory={sessionHistory} />
          )}
          {sessionPhase === "briefing" && (
            <BriefingPhase
              goals={currentSession.goals}
              onStartExploring={handleStartExploring}
              isLoading={isLoading}
              missionData={missionData}
            />
          )}
          {sessionPhase === "active" && (
            <ActivePhase
              goals={currentSession.goals}
              missionData={missionData}
              onReturn={handleReturn}
              elapsedSeconds={elapsedSeconds}
            />
          )}
          {sessionPhase === "debrief" && (
            <DebriefPhase
              goals={currentSession.goals}
              notes={currentSession.reflections}
              missionData={missionData}
              onSummary={handleGenerateSummary}
              isLoading={isLoading}
              debriefChat={debriefChat}
              onAnswerQuestion={handleAnswerQuestion}
              currentAnswer={currentAnswer}
            />
          )}
          {sessionPhase === "summary" && (
            <SummaryPhase
              summary={summaryData}
              onNewSession={handleNewSession}
              isLoading={isLoading}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CareerDreamerApp />);
  </script>
</body>
</html>
